# =====================================================================
# tmux.conf
#   - Colors: Catppuccin Mocha (Ghostty のテーマと統一)
#   - Separators: Nerd Font glyphs (UDEV Gothic 35NFLG 前提)
#   - Plugins: TPM (初回起動時に自動インストール)
# =====================================================================

# ---------------------------------------------------------------------
# General
# ---------------------------------------------------------------------

# True Color 対応 (Ghostty / WezTerm)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -as terminal-features ",*:RGB"

# ESC の遅延をなくす (Neovim 必須設定)
set -sg escape-time 10

# Neovim の autoread などに必要
set -g focus-events on

# ウィンドウ・ペイン番号を 1 始まりに (0 は遠い)
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じたら番号を詰め直す
set -g renumber-windows on

# スクロールバック行数
set -g history-limit 50000

# マウス操作を有効化 (スクロール / ペイン選択 / リサイズ)
set -g mouse on

# OSC 52 でシステムクリップボードと連携
set -g set-clipboard on

# ウィンドウ名を実行中のコマンドで自動更新
setw -g automatic-rename on
set -g set-titles on
set -g set-titles-string "#S / #W"

# ステータスバーの更新間隔
set -g status-interval 5

# ---------------------------------------------------------------------
# Keybindings
# ---------------------------------------------------------------------

# 設定リロード: prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded!"

# ペイン分割: 直感的な記号で、カレントディレクトリを引き継ぐ
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 新規ウィンドウもカレントディレクトリを引き継ぐ
bind c new-window -c "#{pane_current_path}"

# ペイン移動: prefix + hjkl (Vim 風)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ: prefix + HJKL (押しっぱなしで連続リサイズ)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ウィンドウ移動: Shift + 矢印 (prefix 不要)
bind -n S-Left previous-window
bind -n S-Right next-window

# ウィンドウの並び替え: prefix + < / >
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# ペインの最大化トグルは標準の prefix + z

# ---------------------------------------------------------------------
# Copy mode (Vim 風)
# ---------------------------------------------------------------------

setw -g mode-keys vi

# prefix + v でコピーモード開始
bind v copy-mode

# v で選択開始 / C-v で矩形選択 / y でヤンク
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# マウスドラッグ選択でもコピー
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# ---------------------------------------------------------------------
# Status bar / Colors (Catppuccin Mocha)
# ---------------------------------------------------------------------

# palette
%hidden thm_base="#1e1e2e"
%hidden thm_mantle="#181825"
%hidden thm_surface0="#313244"
%hidden thm_surface1="#45475a"
%hidden thm_text="#cdd6f4"
%hidden thm_subtext="#a6adc8"
%hidden thm_blue="#89b4fa"
%hidden thm_lavender="#b4befe"
%hidden thm_mauve="#cba6f7"
%hidden thm_peach="#fab387"
%hidden thm_green="#a6e3a1"
%hidden thm_red="#f38ba8"
%hidden thm_yellow="#f9e2af"

# base
set -g status-position top
set -g status-justify left
set -g status-style "bg=${thm_mantle},fg=${thm_text}"

# left: session name
set -g status-left-length 40
set -g status-left "#[fg=${thm_mantle},bg=${thm_blue},bold]  #S #[fg=${thm_blue},bg=${thm_mantle}]"

# right: prefix indicator / date / time / host
set -g status-right-length 80
set -g status-right "#{?client_prefix,#[fg=${thm_peach}#,bg=${thm_mantle}]#[fg=${thm_mantle}#,bg=${thm_peach}#,bold]PREFIX#[fg=${thm_peach}#,bg=${thm_mantle}] ,}#[fg=${thm_surface0},bg=${thm_mantle}]#[fg=${thm_text},bg=${thm_surface0}]󰃭 %m/%d(%a) 󰥔 %H:%M #[fg=${thm_lavender},bg=${thm_surface0}]#[fg=${thm_mantle},bg=${thm_lavender},bold]󰒋 #h"

# windows
setw -g window-status-separator " "
setw -g window-status-format "#[fg=${thm_surface0},bg=${thm_mantle}]#[fg=${thm_subtext},bg=${thm_surface0}]#I #W#{?window_zoomed_flag, 󰁌,}#[fg=${thm_surface0},bg=${thm_mantle}]"
setw -g window-status-current-format "#[fg=${thm_mauve},bg=${thm_mantle}]#[fg=${thm_mantle},bg=${thm_mauve},bold]#I #W#{?window_zoomed_flag, 󰁌,}#[fg=${thm_mauve},bg=${thm_mantle}]"
setw -g window-status-activity-style "fg=${thm_yellow}"

# pane borders
set -g pane-border-style "fg=${thm_surface0}"
set -g pane-active-border-style "fg=${thm_blue}"

# messages / command prompt
set -g message-style "bg=${thm_surface0},fg=${thm_text}"
set -g message-command-style "bg=${thm_surface0},fg=${thm_text}"

# copy mode selection
set -g mode-style "bg=${thm_surface1},fg=${thm_text}"

# clock & pane number display
setw -g clock-mode-colour "${thm_blue}"
set -g display-panes-active-colour "${thm_blue}"
set -g display-panes-colour "${thm_surface1}"

# ---------------------------------------------------------------------
# Plugins (TPM)
#   prefix + I : インストール / prefix + U : アップデート
# ---------------------------------------------------------------------

# プラグインの配置先を XDG 準拠に (tpm 実行より前に定義すること)
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.local/share/tmux/plugins"

set -g @plugin "tmux-plugins/tpm"

# 定番: 常識的なデフォルト設定の詰め合わせ
set -g @plugin "tmux-plugins/tmux-sensible"

# 定番: y でクリップボードにコピー (macOS / Linux / WSL 対応)
set -g @plugin "tmux-plugins/tmux-yank"

# 定番: セッションの保存・復元 (prefix + C-s 保存 / prefix + C-r 復元)
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @resurrect-capture-pane-contents "on"
set -g @resurrect-strategy-nvim "session"

# 定番: resurrect の自動保存 + tmux 起動時の自動復元
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @continuum-restore "on"
set -g @continuum-save-interval "15"

# 定番: C-h/j/k/l で Neovim と tmux のペインをシームレスに移動
set -g @plugin "christoomey/vim-tmux-navigator"

# TPM が無ければ自動インストール
if "test ! -d ~/.local/share/tmux/plugins/tpm" {
  run "git clone --depth 1 https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm && ~/.local/share/tmux/plugins/tpm/bin/install_plugins"
}

# TPM 初期化 (この行は最下部に置くこと)
run "~/.local/share/tmux/plugins/tpm/tpm"
