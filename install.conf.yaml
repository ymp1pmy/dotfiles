- defaults:
    link:
      relink: true
      force: true

- create:
    - ~/.local
    - ~/.local/share
    - ~/.local/state/zsh
    - ~/.claude

- link:
    ~/.config: files/.config
    ~/.local/bin: files/.local/bin
    ~/.local/share/zsh: files/.local/share/zsh
    ~/.local/share/navi: files/.local/share/navi
    ~/.zshrc: files/.config/zsh/.zshrc
    ~/.zshenv: files/.config/zsh/.zshenv
    ~/.bash_profile: files/.config/bash/.bash_profile
    ~/.lnav: files/.config/.lnav
    ~/.claude/skills: files/.config/.claude/skills
    ~/.claude/hooks: files/.config/.claude/hooks
    ~/.claude/output-styles: files/.config/.claude/output-styles
    ~/.claude/settings.json: files/.config/.claude/settings.json
